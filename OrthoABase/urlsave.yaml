# Unused file. This file is meant to be a template for the urls and keys to download the data.
# You should create a url.yaml file with the same structure and fill in the values with your own urls and keys.

rdvs_history:
  url: "rdvs/rdvs/history"
  type: csv
  keys:
    - "Patient"
    - "Date et heure du RDV"
    - "Plage planning"
    - "Praticien"

jt:
  url: "ang/#!/planning/preparation/jtypes/list/active"
  type: multi
  keys:
    - "metatype"
    - "type_rdv"
    - "startminutes"
    - "endminutes"
    - "praticien_id"
    - "fauteuil"

metatypes:
  url: "planning/jt/journees/5/;view?json=1"
  type: json

users:
  url: "users/recherche"
  type: csv
  keys:
    - "Nom"
    - "Nom.1"
    - "Prénom"

alldays2026:
  url: "planning/agenda/2026/;view_days"
  type: html
  keys:
    - "Titre"
    - "Journée type"
    - "Cabinet ouvert ?"

prothesiste:
  url: "ang/#!/dashboard/prothesiste"
  type: csv
  keys:
  - "Prothésiste"
  - "Patient"
  - "Date du rdv"
  - "Acte prothésiste"
  - "Date d'envoi au labo"
  - "Date de réception"
  - "PE"
  - "Durée"
  - "Commentaires"
