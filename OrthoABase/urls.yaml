rdvs_history:
  url: "rdvs/rdvs/history"
  type: csv
  keys:
    - ["Patient"]
    - ["Date et heure du RDV"]
    - ["Plage planning"]
    - ["Praticien"]

rdvs_all:
  url: "rdvs/rdvs/history/;view_rdvs_all"
  type: csv
  keys:
    - ["Patient"]
    - ["Date et heure du RDV"]
    - ["Plage planning"]
    - ["Praticien"]

jt:  # All journées types
  url: "planning/;jtypes_json_view"
  type: json
  keys:
    - ["jtypes", "title"]
    - ["jtypes", "abspath"]
    - ["jtypes", "name"]
    - ["jtypes", "color"]

jt1:  # Single journée type
  url: "/planning/calendar/;events_view?jt=/planning/jt/journees/{jid}&mode=jt&cabinet=/config-application/cabinets/0"
  type: json
  keys:
    - ["events", "metatype"]
    - ["events", "startminutes"]
    - ["events", "praticien_id"]
    - ["events", "duration"]
    - ["events", "fauteuil"]

MetatypesFauteuils: # Metatypes and Fauteuls
  url: "planning/jt/journees/5/;view?json=1"
  type: json

users:
  url: "users/recherche"
  type: csv
  keys:
    - ["Nom"]
    - ["Nom.1"]
    - ["Prénom"]

alldaysyear:
  url: "planning/agenda/{year}/;view_days"
  type: html
  keys:
    - ["Titre"]
    - ["Journée type"]
    - ["Cabinet ouvert ?"]

prothesiste:
  url: "medical/prothesiste/planning"
  type: csv
  keys:
    - ["Prothésiste"]
    - ["Patient"]
    - ["Date du rdv"]   
    - ["Acte prothésiste"]
    - ["Date d'envoi au labo"]
    - ["Date de réception"]
    - ["PE"]
    - ["Durée"]
    - ["Commentaires"]

recette_jour:
  url: "reglements/history/;search?doperation={dayin}&doperation={dayout}"
  type: csv
  keys:
    - ["Montant"]
    - ["Réglé le"]
    - ["Encaissé"]

stat_periodes:
  url: "statistiques/stat-periodes-traitement"
  type: csv

daily_calendar: #{day} format: YYYY-MM-DD
  url: "/planning/calendar/;events_view?day={day}&mode=daily&cabinet=/config-application/cabinets/0&praticien="
  type: json
  keys:
    - ["events", "date"]
    - ["events", "startminutes"]
    - ["events", "duration"]
    - ["events", "praticien_id"]
    - ["events", "fauteuil"]
    - ["events", "patient_name"]
    - ["events", "metatype"]

user_params:
  url: "users/{user_id}/;view_json?keys=user_color" 
  type: json
  keys:
    - ["user", "user_color"]
    - ["user", "archive_delay"]
    - ["user", "user_statistics_group"]

echeances:
  url: "reglements/echeances/;view?expected_date={date_start}&expected_date={date_end}"
  type: csv
  keys:
    - ["ID Patient"]
    - ["Dû"]
    - ["Date"]
    - ["Acte"]

JsonProth:
  url: "medical/prothesiste/planning/;view?action=export_as_json"
  type: json_paginated

PhotosLibelles:
  url: "medical/photos/libelles"
  type: html_paginated
  